spring:
  application:
    name: 论坛系统 # 项目名称
  output:
    ansi:
      enabled: ALWAYS #彩色日志
  datasource: # 配置数据源
    url: jdbc:mysql://127.0.0.1:3306/forum_db_001?characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true # 数据库连接串
    username: root # 数据库用户名
    password: 123456 # 数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver # 数据库连接驱动
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER #Springfox-Swagger兼容性配置

  jackson: # JSON序列化配置
    date-format: yyyy-MM-dd HH:mm:ss # 日期格式
    default-property-inclusion: NON_NULL # 不为null时序列化

  # Redis配置
  redis:
    host: 127.0.0.1 # Redis服务器地址
    port: 6379 # Redis端口号
    database: 0 # 使用默认数据库
    timeout: 10000ms # 连接超时时间

server:
  port: 58080 # 自定义服务端口号

logging:
  pattern:
    dateformat: MM-dd HH:mm:ss # 日期的显示格式
  level:
    root: info # 日=日志的默认级别
    com.example.demo: debug # 指定包下的日志级别
  file:
    path: D:\log\forum_001 # 日志保存的路径

# mybatis 相关配置，单独配置，顶格写
mybatis:
  mapper-locations: classpath:mapper/**/*.xml # 指定 xxxMapper.xml的扫描路径
  # 在spring下加入子节点


# 项目自定义相关配置
one-forum:
  login:
    url: sign-in.html # 未登录状况下强制跳转页面
  index: # 首页配置节点
    board-num: 9 # 首页中显示的版块个数