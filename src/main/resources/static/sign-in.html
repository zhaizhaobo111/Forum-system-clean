<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
  <link rel="shortcut icon" href="/favicon.ico">
  <title>AI Community - 登录</title>
  <link href="./dist/css/tabler.min.css?1674944402" rel="stylesheet"/>
  <link rel="stylesheet" href="./dist/css/jquery.toast.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0F172A;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ===== Aurora 极光背景 ===== */
    .aurora-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .aurora {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: aurora-drift 20s ease-in-out infinite alternate;
    }

    .aurora-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #3B82F6 0%, transparent 70%);
      top: -200px; left: -100px;
      animation-delay: 0s;
    }

    .aurora-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6366F1 0%, transparent 70%);
      top: 50%; right: -150px;
      animation-delay: -5s;
    }

    .aurora-3 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #8B5CF6 0%, transparent 70%);
      bottom: -300px; left: 30%;
      animation-delay: -10s;
    }

    .aurora-4 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #06B6D4 0%, transparent 70%);
      top: 20%; left: 50%;
      animation-delay: -15s;
    }

    @keyframes aurora-drift {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 30px) scale(0.95); }
      100% { transform: translate(10px, -10px) scale(1.02); }
    }

    /* ===== Agent Workflow 背景 ===== */
    .agent-workflow {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.15;
      z-index: 1;
    }

    .workflow-node {
      position: absolute;
      padding: 12px 24px;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 12px;
      color: #3B82F6;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(10px);
      animation: node-breathe 4s ease-in-out infinite;
    }

    .workflow-node::before {
      content: '';
      position: absolute;
      top: 50%; left: -20px;
      width: 20px; height: 2px;
      background: linear-gradient(90deg, transparent, #3B82F6);
      transform: translateY(-50%);
    }

    .node-planner { top: 20%; left: 15%; animation-delay: 0s; }
    .node-search { top: 35%; left: 25%; animation-delay: 1s; }
    .node-writer { top: 50%; left: 18%; animation-delay: 2s; }
    .node-summary { top: 65%; left: 22%; animation-delay: 3s; }

    @keyframes node-breathe {
      0%, 100% { opacity: 0.4; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
      50% { opacity: 0.7; box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); }
    }

    /* 连接线 */
    .workflow-line {
      position: absolute;
      width: 2px;
      height: 60px;
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.3) 0%, rgba(59, 130, 246, 0.1) 100%);
      overflow: hidden;
    }

    .workflow-line::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 20px;
      background: linear-gradient(180deg, transparent, #3B82F6, transparent);
      animation: data-flow 2s linear infinite;
    }

    @keyframes data-flow {
      0% { top: -20px; }
      100% { top: 100%; }
    }

    .line-1 { top: 32%; left: 17%; }
    .line-2 { top: 47%; left: 20%; }
    .line-3 { top: 62%; left: 17%; }

    /* ===== 主容器 ===== */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      z-index: 2;
    }

    /* ===== 左侧品牌区 ===== */
    .brand-section {
      flex: 1.2;
      max-width: 560px;
      padding-right: 80px;
      color: white;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
    }

    .brand-logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: bold;
    }

    .brand-logo-text {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-title {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-subtitle {
      font-size: 20px;
      color: #94a3b8;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .brand-desc {
      font-size: 16px;
      color: #64748b;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .brand-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #94a3b8;
      font-size: 15px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out forwards;
    }

    .feature-item:nth-child(1) { animation-delay: 0.3s; }
    .feature-item:nth-child(2) { animation-delay: 0.4s; }
    .feature-item:nth-child(3) { animation-delay: 0.5s; }
    .feature-item:nth-child(4) { animation-delay: 0.6s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .feature-icon {
      width: 24px; height: 24px;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* ===== 右侧登录卡片 ===== */
    .login-section {
      width: 100%;
      max-width: 440px;
      animation: fadeInUp 1s ease-out 0.2s backwards;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      color: #64748b;
    }

    /* ===== 表单样式 ===== */
    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15), 0 0 20px rgba(59, 130, 246, 0.1);
      background: rgba(255, 255, 255, 0.08);
    }

    .form-input::placeholder {
      color: #475569;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      transition: color 0.3s ease;
      pointer-events: none;
    }

    .form-input:focus ~ .input-icon {
      color: #3B82F6;
    }

    .input-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      cursor: pointer;
      transition: color 0.3s ease;
      z-index: 1;
    }

    .input-toggle:hover {
      color: #94a3b8;
    }

    /* ===== 按钮样式 ===== */
    .login-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:active {
      transform: translateY(0);
    }

    /* ===== 其他链接 ===== */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: #64748b;
      font-size: 14px;
    }

    .login-footer a {
      color: #3B82F6;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .login-footer a:hover {
      color: #8B5CF6;
    }

    /* ===== 错误提示 ===== */
    .error-text {
      color: #EF4444;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .form-input.error {
      border-color: #EF4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 992px) {
      .brand-section {
        display: none;
      }
      .login-section {
        max-width: 100%;
      }
      .login-container {
        padding: 20px;
      }
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
        border-radius: 16px;
      }
      .brand-title {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <!-- Aurora 极光背景 -->
  <div class="aurora-container">
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
    <div class="aurora aurora-4"></div>
  </div>

  <!-- Agent Workflow 背景 -->
  <div class="agent-workflow">
    <div class="workflow-node node-planner">Planner</div>
    <div class="workflow-line line-1"></div>
    <div class="workflow-node node-search">Search</div>
    <div class="workflow-line line-2"></div>
    <div class="workflow-node node-writer">Writer</div>
    <div class="workflow-line line-3"></div>
    <div class="workflow-node node-summary">Summary</div>
  </div>

  <!-- 主容器 -->
  <div class="login-container">
    <!-- 左侧品牌区 -->
    <div class="brand-section">
      <div class="brand-logo">
        <div class="brand-logo-icon">AC</div>
        <div class="brand-logo-text">AI Community</div>
      </div>
      <h1 class="brand-title">Build · Learn · Share</h1>
      <p class="brand-subtitle">探索 AI Agent、LangChain、LangGraph 与现代技术社区</p>

      <div class="brand-features">
        <div class="feature-item">
          <span class="feature-icon">✓</span>
          <span>AI 摘要</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">✓</span>
          <span>AI 发帖助手</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">✓</span>
          <span>Agent Workflow</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">✓</span>
          <span>智能推荐</span>
        </div>
      </div>
    </div>

    <!-- 右侧登录卡片 -->
    <div class="login-section">
      <div class="login-card">
        <div class="login-header">
          <h2 class="login-title">欢迎回来</h2>
          <p class="login-subtitle">登录你的账户，继续探索</p>
        </div>

        <form id="signInForm">
          <div class="form-group">
            <label class="form-label">用户名</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </span>
              <input type="text" class="form-input" placeholder="请输入用户名" name="username" id="username">
            </div>
            <div class="error-text" id="username-error">用户名不能为空</div>
          </div>

          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </span>
              <input type="password" class="form-input" placeholder="请输入密码" name="password" id="password">
              <span class="input-toggle" id="password-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </span>
            </div>
            <div class="error-text" id="password-error">密码不能为空</div>
          </div>

          <button type="submit" class="login-btn" id="submit">
            登 录
          </button>
        </form>

        <div class="login-footer">
          还没有账户？ <a href="./sign-up.html">立即注册</a>
        </div>
      </div>
    </div>
  </div>

  <!-- 导入JS -->
  <script src="./dist/js/jquery-3.6.3.min.js"></script>
  <script src="./dist/js/tabler.min.js"></script>
  <script src="./dist/js/jquery.toast.js"></script>
  <script>
    $(function () {
      let usernameEl = $('#username');
      let passwordEl = $('#password');
      let usernameError = $('#username-error');
      let passwordError = $('#password-error');

      $('#submit').click(function (e) {
        e.preventDefault();
        let checkForm = true;

        if (!usernameEl.val()) {
          usernameEl.addClass('error');
          usernameError.show();
          checkForm = false;
        } else {
          usernameEl.removeClass('error');
          usernameError.hide();
        }

        if (!passwordEl.val()) {
          passwordEl.addClass('error');
          passwordError.show();
          checkForm = false;
        } else {
          passwordEl.removeClass('error');
          passwordError.hide();
        }

        if (!checkForm) {
          return false;
        }

        let postData = {
          username: usernameEl.val(),
          password: passwordEl.val(),
        }

        $.ajax({
          type: 'post',
          url: 'user/login',
          contentType: 'application/x-www-form-urlencoded',
          data: postData,
          success: function(respData) {
            if (respData.code == 0) {
              location.assign('/index.html');
            } else {
              $.toast({
                heading: '警告',
                text: respData.message,
                icon: 'warning'
              });
            }
          },
          error: function() {
            $.toast({
              heading: '错误',
              text: '访问出现问题，请与管理员联系',
              icon: 'error'
            });
          }
        });
      });

      $('.form-input').on('focus', function() {
        $(this).parent().find('.input-icon').css('color', '#3B82F6');
      }).on('blur', function() {
        $(this).parent().find('.input-icon').css('color', '#475569');
      });

      $('#password-toggle').click(function() {
        if (passwordEl.attr('type') == 'password') {
          passwordEl.attr('type', 'text');
        } else {
          passwordEl.attr('type', 'password');
        }
      });

      $('#username, #password').on('input', function () {
        if ($(this).val()) {
          $(this).removeClass('error');
          $(this).next('.error-text').hide();
        }
      });
    });
  </script>
</body>
</html>
