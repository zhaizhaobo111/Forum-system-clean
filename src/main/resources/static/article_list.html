<!-- Page body -->
<div class="page-body">
  <div class="container-xl">
    <!-- 品牌宣传区 - 星空背景 -->
    <div class="row mb-4">
      <div class="col-12">
        <div class="hero-banner" style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.15) 50%, rgba(217, 70, 239, 0.1) 100%); border-radius: 16px; padding: 60px 40px; text-align: center; position: relative; overflow: hidden;">
          <!-- 背景光效 -->
          <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.3), transparent 50%); pointer-events: none;"></div>
          <div style="position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: radial-gradient(circle at 70% 70%, rgba(139, 92, 246, 0.2), transparent 50%); pointer-events: none;"></div>
          <!-- 内容 -->
          <div style="position: relative; z-index: 1;">
            <h1 style="color: #fff; font-size: 2.5rem; font-weight: 700; margin-bottom: 15px;">欢迎来到 AI 智能社区</h1>
            <p style="color: #8b8b9e; font-size: 1.1rem; margin-bottom: 30px;">探索、学习、分享最新AI技术与经验</p>
            <button class="btn btn-primary btn-lg" onclick="showAiAssistant()" style="padding: 12px 40px; font-size: 1.1rem;">
              ✨ 开始探索
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <!-- 左侧：最新讨论（占比大） -->
      <div class="col-lg-8">
        <div class="card mb-4">
          <div class="card-header">
            <h3 class="card-title">💬 最新讨论</h3>
            <a href="javascript:void(0);" class="card-title-link">更多推荐 ›</a>
          </div>
          <div class="card-body p-0">
            <div class="divide-y" id="artical-items-body">
              <!-- 动态生成帖子列表 -->
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：AI推荐 + 今日热门 -->
      <div class="col-lg-4">
        <!-- AI推荐 -->
        <div class="card mb-4">
          <div class="card-header">
            <h3 class="card-title">🤖 AI 推荐</h3>
          </div>
          <div class="card-body">
            <div class="d-flex align-items-center mb-3">
              <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px;">
                <span style="font-size: 40px;">🤖</span>
              </div>
              <div>
                <p style="color: #8b8b9e; margin-bottom: 5px;">你好！我是AI助手</p>
                <p style="color: #fff; font-weight: 500;">有什么可以帮你的？</p>
              </div>
            </div>
            <button class="btn btn-primary w-100" onclick="showAiAssistant()">✨ 开始对话</button>
          </div>
        </div>

        <!-- 热门标签 -->
        <div class="card mb-4">
          <div class="card-header">
            <h3 class="card-title">🏷️ 热门标签</h3>
          </div>
          <div class="card-body">
            <div class="d-flex flex-wrap gap-2">
              <span class="badge" style="background: rgba(59, 130, 246, 0.15); color: #3b82f6; padding: 6px 12px; border-radius: 20px;">Java</span>
              <span class="badge" style="background: rgba(139, 92, 246, 0.15); color: #8b5cf6; padding: 6px 12px; border-radius: 20px;">Python</span>
              <span class="badge" style="background: rgba(217, 70, 239, 0.15); color: #d946ef; padding: 6px 12px; border-radius: 20px;">AI</span>
              <span class="badge" style="background: rgba(59, 130, 246, 0.15); color: #3b82f6; padding: 6px 12px; border-radius: 20px;">LangChain</span>
              <span class="badge" style="background: rgba(139, 92, 246, 0.15); color: #8b5cf6; padding: 6px 12px; border-radius: 20px;">Spring Boot</span>
              <span class="badge" style="background: rgba(217, 70, 239, 0.15); color: #d946ef; padding: 6px 12px; border-radius: 20px;">MySQL</span>
            </div>
          </div>
        </div>

        <!-- 今日热门 -->
        <div class="card mb-4">
          <div class="card-header">
            <h3 class="card-title">🔥 今日热门</h3>
            <a href="javascript:void(0);" class="card-title-link">更多推荐 ›</a>
          </div>
          <div class="card-body p-0">
            <div class="list-group list-group-flush" id="hot-posts">
              <!-- 动态生成热门帖子 -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- 正文 结束 -->
</div>
<script>
  $(function () {
    // ========================= 获取版块下帖子信息 =======================
    // 获取当前选中的版块
    let activeLiEl = $('#topBoardList>.active');
    // 构造query string
    let queryString = '';
    let boardData = activeLiEl.data('board');
    // 导航栏版块Item是否绑定版块数据
    if (boardData) {
      // 构造query string
      queryString = '?boardId=' + boardData.id;
      // 获取版块信息
      getBoardInfo(boardData.id);
    } else {
      // 设置版块名称
      $('#article_list_board_title').html('首页');
      $('#article_list_count_board').hide();
    }

    // ========================= 加载今日热门帖子 =======================
    function loadHotPosts(data) {
      if (data.length === 0) return;
      // 按访问量排序，取前5个
      let hotPosts = data.sort((a, b) => b.visitCount - a.visitCount).slice(0, 5);
      let html = '';
      hotPosts.forEach((post, index) => {
        html += '<a href="javascript:void(0);" class="list-group-item list-group-item-action article_list_a_title" '
          + 'style="background: transparent; border-color: var(--border-color);">'
          + '<div class="d-flex align-items-center gap-2">'
          + '<span class="text-muted">' + (index + 1) + '</span>'
          + '<div>'
          + '<div class="article-title" style="font-size: 14px;">' + post.title + '</div>'
          + '<small class="text-muted">👁️ ' + post.visitCount + '</small>'
          + '</div>'
          + '</div>'
          + '</a>';
      });
      $('#hot-posts').html(html);
    }

    // 初始加载热门帖子
    $.ajax({
      type: 'get',
      url: 'article/getAllByBoardId',
      success: function(respData) {
        if (respData.code == 0) {
          loadHotPosts(respData.data);
        }
      }
    });

    // ========================= 获取版块信息 =======================
    // 
    function getBoardInfo (boardId) {
      if (!boardId) {
        return;
      }
      // 发送请求， 成功后，显示版块相关信息
      $.ajax({
        type:'get',
        url:'board/getById?id='+boardId,
        success:function(respData){
          if(respData.code==0){
            let board=respData.data;
              //成功时，更新页面内容
              $('#article_list_board_title').html(board.name);
              $('#article_list_count_board').html('帖子数量： '+board.articleCount);
          }
          else{
             $.toast({
              heading:'警告',
              text: respData.message,
              icon:'warning'
            });

          }
        },
        error:function(){
          $.toast({
              heading:'错误',
              text: '访问出现问题，请与管理员联系',
              icon:'error'
          });
        }
      });
    }

    // ========================= 获取帖子列表 =======================
    // 成功后，调用listBuildArticleList()方法，构建帖子列表
    $.ajax({
      type:'get',
      url:'article/getAllByBoardId'+queryString,
    success:function(respData){
      if(respData.code==0){
          listBuildArticleList(respData.data);
      }
      else{
       $.toast({
              heading:'警告',
              text: respData.message,
              icon:'warning'
            });
    } 
    },
    error:function(){
        $.toast({
              heading:'错误',
              text: '访问出现问题，请与管理员联系',
              icon:'error'
          });
    }
    });

    // ========================= 构造帖子列表 =======================
    function listBuildArticleList(data) {
      if(data.length == 0) {
        $('#artical-items-body').html('还没有帖子');
        return;
      }
      // 默认头像路径
      let avatarUrl = 'image/avatar01.jpeg';
      // 遍历结果
      data.forEach(article => {
        // 设置默认头像
        if (!article.user.avatarUrl) {
          article.user.avatarUrl = avatarUrl;
        }
        // 构造HTML
        let summaryHtml = '';
        if (article.summary && article.summary.trim() !== '') {
          summaryHtml = '<div class="mb-2" style="max-width: 600px;">'
            + '<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5;">'
            + '<span style="margin-right: 6px;">🤖</span>'
            + '<strong>AI摘要：</strong> '
            + article.summary
            + '</div>'
            + '</div>';
        }
        let articleHtmlStr = '<div>'
          + ' <div class="row">'
          + ' <div class="col-auto">'
          + ' <span class="avatar" style="background-image: url(' + article.user.avatarUrl + ')"></span>'
          + ' </div>'
          + ' <div class="col">'
          + ' <div class="text-truncate">'
          + ' <a href="javascript:void(0);" class="article_list_a_title">'
          + ' <strong>' + article.title + '</strong>'
          + ' </a>'
          + ' <button class="btn btn-sm btn-outline-primary ms-2 ai-summary-btn" data-id="' + article.id + '">'
          + ' 🤖 AI摘要'
          + ' </button>'
          + ' </div>'
          + summaryHtml
          + ' <div class="text-muted mt-2">'
          + ' <div class="row">'
          + ' <div class="col">'
          + ' <ul class="list-inline list-inline-dots mb-0">'
          + ' <li class="list-inline-item">'
          + ' <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-user"'
          + ' width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"'
          + ' fill="none" stroke-linecap="round" stroke-linejoin="round">'
          + ' <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>'
          + ' <path d="M12 7m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path>'
          + ' <path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"></path>'
          + ' </svg> '
          + article.user.nickname
          + ' </li>'
          + ' <li class="list-inline-item">'
          + ' <svg xmlns="http://www.w3.org/2000/svg"'
          + ' class="icon icon-tabler icon-tabler-clock-edit" width="24" height="24"'
          + ' viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"'
          + ' stroke-linecap="round" stroke-linejoin="round">'
          + ' <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>'
          + ' <path d="M21 12a9 9 0 1 0 -9.972 8.948c.32 .034 .644 .052 .972 .052"></path>'
          + ' <path d="M12 7v5l2 2"></path>'
          + ' <path d="M18.42 15.61a2.1 2.1 0 0 1 2.97 2.97l-3.39 3.42h-3v-3l3.42 -3.39z">'
          + ' </path>'
          + ' </svg> '
          + article.createTime
          + ' </li>'
          + ' </ul>'
          + ' </div>'
          + ' <div class="col-auto d-none d-md-inline">'
          + ' <ul class="list-inline list-inline-dots mb-0">'
          + ' <li class="list-inline-item">'
          + ' <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-eye"'
          + ' width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"'
          + ' fill="none" stroke-linecap="round" stroke-linejoin="round">'
          + ' <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>'
          + ' <path d="M12 12m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path>'
          + ' <path'
          + ' d="M22 12c-2.667 4.667 -6 7 -10 7s-7.333 -2.333 -10 -7c2.667 -4.667 6 -7 10 -7s7.333 2.333 10 7">'
          + ' </path>'
          + ' </svg> '
          + article.visitCount
          + ' </li>'
          + ' <li class="list-inline-item">'
          + ' <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-heart"'
          + ' width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"'
          + ' fill="none" stroke-linecap="round" stroke-linejoin="round">'
          + ' <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>'
          + ' <path'
          + ' d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572">'
          + ' </path>'
          + ' </svg> '
          + article.likeCount
          + ' </li>'
          + ' <li class="list-inline-item">'
          + ' <svg xmlns="http://www.w3.org/2000/svg"'
          + ' class="icon icon-tabler icon-tabler-message-circle" width="24" height="24"'
          + ' viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"'
          + ' stroke-linecap="round" stroke-linejoin="round">'
          + ' <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>'
          + ' <path d="M3 20l1.3 -3.9a9 8 0 1 1 3.4 2.9l-4.7 1"></path>'
          + ' <path d="M12 12l0 .01"></path>'
          + ' <path d="M8 12l0 .01"></path>'
          + ' <path d="M16 12l0 .01"></path>'
          + ' </svg> '
          + article.replyCount
          + ' </li>'
          + ' </ul>'
          + ' </div>'
          + ' </div>'
          + ' </div>'
          + ' </div>'
          + ' </div>'
          + ' </div>';
        // 转为元素对象
        let articleItem = $(articleHtmlStr);
        // 获取标题的 a 标签
        let articleTitle = articleItem.find('.article_list_a_title');
        // 处理标题点击事件
        articleTitle.click(function() {
          // 通过全局变量保存当前访问的帖子信息
          currentArticle = article;
          removeNavActive();
          $('#bit-forum-content').load('details.html');
        });
        // 添加到列表
        $('#artical-items-body').append(articleItem);
      });
    }

    // ================== 处理发贴事件 =====================
    $('.article_post').click(function () {
      console.log('加载发贴页面');
      removeNavActive();
      $('#bit-forum-content').load('article.html');
    });

    // ================== 处理AI摘要按钮点击事件 =====================
    $(document).on('click', '.ai-summary-btn', function() {
      let btn = $(this);
      let articleId = btn.data('id');
      let summaryDiv = $('#summary-' + articleId);

      // 如果已经显示摘要，则隐藏
      if (summaryDiv.is(':visible')) {
        summaryDiv.hide();
        btn.html('🤖 AI摘要');
        return;
      }

      // 显示加载中
      btn.prop('disabled', true).html('⏳ 生成中...');
      summaryDiv.html('<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 12px; border-radius: 8px; font-size: 13px;"><span style="margin-right: 6px;">⏳</span>正在生成AI摘要，请稍候...</div>').show();

      // 调用后端API生成摘要
      $.ajax({
        type: 'post',
        url: 'article/generateSummary?id=' + articleId,
        success: function(respData) {
          if (respData.code == 0) {
            // 开始轮询检查摘要是否生成完成
            pollSummary(articleId, summaryDiv, btn);
          } else {
            summaryDiv.html('<div style="background: #fee; color: #c00; padding: 8px 12px; border-radius: 8px; font-size: 13px;"><span style="margin-right: 6px;">❌</span>生成失败：' + respData.message + '</div>');
            btn.prop('disabled', false).html('🤖 AI摘要');
          }
        },
        error: function() {
          summaryDiv.html('<div style="background: #fee; color: #c00; padding: 8px 12px; border-radius: 8px; font-size: 13px;"><span style="margin-right: 6px;">❌</span>请求失败</div>');
          btn.prop('disabled', false).html('🤖 AI摘要');
        }
      });
    });

    // 轮询检查摘要是否生成完成
    function pollSummary(articleId, summaryDiv, btn) {
      let checkCount = 0;
      let maxChecks = 30; // 最多检查30次（30秒）

      let checkInterval = setInterval(function() {
        checkCount++;

        // 获取帖子详情，检查摘要是否生成
        $.ajax({
          type: 'get',
          url: 'article/getAllByBoardId',
          success: function(respData) {
            if (respData.code == 0) {
              // 找到当前帖子
              let article = respData.data.find(a => a.id == articleId);
              if (article && article.summary && article.summary.trim() !== '') {
                // 摘要已生成，停止轮询
                clearInterval(checkInterval);

                // 直接显示摘要
                summaryDiv.html('<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5;"><span style="margin-right: 6px;">🤖</span><strong>AI摘要：</strong> ' + article.summary + '</div>');

                // 恢复按钮状态
                btn.prop('disabled', false).html('🤖 AI摘要');

                console.log('摘要生成完成：', article.summary);
              } else if (checkCount >= maxChecks) {
                // 超时，停止轮询
                clearInterval(checkInterval);

                summaryDiv.html('<div style="background: #fff3cd; color: #856404; padding: 8px 12px; border-radius: 8px; font-size: 13px;"><span style="margin-right: 6px;">⏳</span>生成时间较长，请稍后刷新页面查看</div>');

                // 恢复按钮状态
                btn.prop('disabled', false).html('🤖 AI摘要');
              }
            }
          },
          error: function() {
            // 请求失败，停止轮询
            clearInterval(checkInterval);
            summaryDiv.html('<div style="background: #fee; color: #c00; padding: 8px 12px; border-radius: 8px; font-size: 13px;"><span style="margin-right: 6px;">❌</span>检查失败，请刷新页面查看</div>');
            btn.prop('disabled', false).html('🤖 AI摘要');
          }
        });
      }, 1000); // 每秒检查一次
    }

  });
</script>
